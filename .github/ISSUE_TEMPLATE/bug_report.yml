name: Bug report
description: Report a reproducible gameplay, Godot, or export issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open the project in Godot 4.6.
        2. Run scenes/Main.tscn.
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: godot_version
    attributes:
      label: Godot version
      placeholder: "4.6"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "macOS, iOS, Windows, Linux"
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshots, video, or logs
      description: Add any supporting media or logs here.
